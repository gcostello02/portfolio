# Self-hosted deployment for mini PC + Cloudflare Tunnel.
#
# Existing tunnel (e.g. Jellyfin): only portfolio is needed.
#   cp .env.example .env   # set PUBLIC_FORMSPREE_FORM_ID
#   docker compose build && docker compose up -d
#   Add gcostello.com → http://localhost:8080 on your tunnel's Public Hostnames tab
#
# New dedicated tunnel: use the "tunnel" profile (requires TUNNEL_TOKEN in .env).
#   docker compose --profile tunnel up -d --build
services:
  portfolio:
    build:
      context: .
      args:
        PUBLIC_FORMSPREE_FORM_ID: ${PUBLIC_FORMSPREE_FORM_ID:-}
    image: portfolio:latest
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in .env}
    depends_on:
      portfolio:
        condition: service_healthy
