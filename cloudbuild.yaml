# Build the app image and push to Artifact Registry.
# Deploy with: ./scripts/deploy-gcloud.sh or scripts/deploy-gcloud.ps1
# Optional: _PUBLIC_FORMSPREE_FORM_ID for contact form (from .env PUBLIC_FORMSPREE_FORM_ID)
substitutions:
  _REGION: us-east4
  _REPO: portfolio
  _IMAGE: portfolio
  _PUBLIC_FORMSPREE_FORM_ID: xwvrldpo

options:
  substitutionOption: ALLOW_LOOSE

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "PUBLIC_FORMSPREE_FORM_ID=${_PUBLIC_FORMSPREE_FORM_ID}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest"
      - "."

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest"
